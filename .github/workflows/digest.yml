name: Generate Morning Digest

on:
  schedule:
    # 11:30 UTC = 7:30am Eastern (6:30am during EDT... adjust as needed)
    # Runs Mon-Fri only. Cron is UTC always — see README for adjusting.
    - cron: '30 11 * * 1-5'
  workflow_dispatch: {}  # lets you manually trigger a run from the Actions tab

permissions:
  contents: write

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_digest.py

      - name: Commit and push updated digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --quiet --cached || git commit -m "Update morning digest $(date -u +%Y-%m-%d)"
          git push
